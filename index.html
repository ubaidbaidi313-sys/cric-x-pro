<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC-X PRO | Live Cricket Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .main-card { background: linear-gradient(145deg, #121212, #080808); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .main-card:hover { transform: translateY(-10px); border-color: rgba(16, 185, 129, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #loader { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s; }
        .loader-logo { font-size: 3rem; font-weight: 900; font-style: italic; color: #10b981; letter-spacing: -2px; animation: neon-pulse 1.5s infinite alternate; }
        @keyframes neon-pulse { 0% { opacity: 0.3; transform: scale(0.95); filter: blur(2px); } 100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 20px #10b981); } }
        .loader-hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body class="pb-20">
    <div id="loader">
        <div class="loader-logo uppercase tracking-tighter">CRIC-X PRO</div>
        <p class="text-[9px] font-black text-zinc-700 uppercase tracking-[0.5em] mt-4">Syncing Global API Data...</p>
    </div>

    <nav class="sticky top-0 z-50 glass-nav px-8 py-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-12">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">CRIC-X <span class="text-emerald-500">PRO</span></h1>
            </div>
            <div class="hidden xl:flex gap-8 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <a href="index.html" class="text-white">Home</a>
                <a href="#" class="hover:text-white transition-all">News Hub</a>
                <a href="#" class="hover:text-white transition-all">Rankings</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-800 p-[1px]">
                <div class="w-full h-full bg-[#050505] rounded-[15px] flex items-center justify-center font-black text-emerald-500 text-[10px]">API</div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-6 mt-12">
        <header class="flex justify-between items-end mb-8">
            <div>
                <p class="text-emerald-500 font-black text-[10px] uppercase tracking-[0.5em] mb-2">Live Now</p>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">Match Center</h2>
            </div>
        </header>

        <div id="match-container" class="flex gap-6 overflow-x-auto pb-10 no-scrollbar">
            <div class="min-w-[450px] main-card rounded-[50px] p-10 relative group block">
                <div class="flex justify-between items-center mb-10">
                    <span class="bg-emerald-500 text-black text-[9px] font-black px-3 py-1 rounded italic uppercase">Live</span>
                    <span id="match-status" class="text-zinc-500 text-[9px] font-bold uppercase tracking-widest text-right italic text-emerald-500/80">Fetching...</span>
                </div>
                <div class="flex justify-between items-center px-4">
                    <div class="text-center w-full">
                        <p id="match-teams" class="text-2xl font-black italic mb-2 uppercase text-white tracking-tighter">Searching Matches</p>
                        <p id="live-score" class="text-emerald-400 font-black text-4xl italic tracking-tighter">...</p>
                    </div>
                </div>
                <div class="mt-10 pt-6 border-t border-white/5 text-center">
                    <p id="match-overs" class="text-[10px] text-zinc-500 font-black uppercase tracking-[0.3em]">Syncing with global servers</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 bg-[#0a0a0a] border-t border-white/5 pt-12 pb-12">
        <div class="max-w-[1400px] mx-auto px-8 text-center">
            <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.2em]">© 2026 CRIC-X PRO | Powered by RapidAPI Professional Engine</p>
        </div>
    </footer>

    <script>
        // Loader logic
        window.addEventListener("load", () => {
            setTimeout(() => { document.getElementById("loader").classList.add("loader-hidden"); }, 1500);
        });

        // API Configuration
        const API_KEY = "774480cda4mshdee83eb8c7a1f81p169bd2jsn66911a533ae8";
        const API_HOST = "cricket-live-data.p.rapidapi.com";

        async function fetchLiveScores() {
            try {
                const response = await fetch(`https://${API_HOST}/matches-live`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': API_HOST }
                });
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const match = data.results[0]; // Pehla sabse bada live match
                    
                    document.getElementById('match-teams').innerText = match.match_title || "Live Match";
                    document.getElementById('live-score').innerText = match.live_details.score || "Starting...";
                    document.getElementById('match-status').innerText = match.series.name;
                    document.getElementById('match-overs').innerText = "Last Updated: Just Now";
                } else {
                    document.getElementById('match-teams').innerText = "No Live Matches";
                    document.getElementById('live-score').innerText = "Check Back Later";
                    document.getElementById('match-status').innerText = "Standby Mode";
                }
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('live-score').innerText = "Connection Error";
            }
        }

        // Har 15 minute baad update (Free Limit Protection)
        setInterval(fetchLiveScores, 900000);
        fetchLiveScores(); // Run once on load
    </script>
</body>
</html>
