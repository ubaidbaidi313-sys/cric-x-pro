<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC-X PRO | The Complete Cricket Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .main-card { background: linear-gradient(145deg, #121212, #080808); border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.4s ease; }
        .recent-card { background: rgba(20, 20, 20, 0.5); border: 1px solid rgba(255, 255, 255, 0.02); transition: 0.3s; height: 100%; }
        .recent-card:hover { border-color: #10b981; background: rgba(30, 30, 30, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader-hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body class="pb-20">
    <div id="loader">
        <div class="text-4xl font-black italic text-emerald-500 animate-pulse uppercase">CRIC-X PRO</div>
        <p class="text-[8px] font-bold text-zinc-600 uppercase tracking-widest mt-2">Connecting to Cricket Servers...</p>
    </div>

    <nav class="sticky top-0 z-50 glass-nav px-8 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase cursor-pointer" onclick="location.reload()">CRIC-X <span class="text-emerald-500">PRO</span></h1>
        <div class="hidden md:flex gap-8 text-[9px] font-black uppercase tracking-widest text-zinc-500">
            <a href="index.html" class="text-white border-b-2 border-emerald-500 pb-1">Home</a>
            <a href="#" class="hover:text-white transition-all">Schedules</a>
            <a href="#" class="hover:text-white transition-all">News Hub</a>
            <a href="#" class="hover:text-white transition-all">IPL/PSL Hub</a>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-6 mt-12">
        <section class="mb-16">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <p class="text-emerald-500 font-black text-[10px] uppercase tracking-[0.5em] mb-1">In Play</p>
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter">Live Matches</h2>
                </div>
            </div>
            <div id="live-container" class="flex gap-6 overflow-x-auto pb-6 no-scrollbar">
                <div class="text-zinc-800 font-black italic animate-pulse">CHECKING SATELLITE FEEDS...</div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-8 border-l-4 border-emerald-500 pl-4">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Recent Results <span class="text-[10px] text-zinc-600 ml-2 italic tracking-normal">(Auto-Updated)</span></h2>
            </div>
            <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFoOBzZPZPMI_rvuWjSevEqQbeOjcPKww",
            authDomain: "cric-x-pro.firebaseapp.com",
            databaseURL: "https://cric-x-pro-default-rtdb.firebaseio.com",
            projectId: "cric-x-pro",
            storageBucket: "cric-x-pro.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const API_KEY = "774480cda4mshdee83eb8c7a1f81p169bd2jsn66911a533ae8";
        const API_HOST = "cricket-live-data.p.rapidapi.com";

        window.onload = () => setTimeout(() => document.getElementById('loader').classList.add('loader-hidden'), 1200);

        async function syncData() {
            try {
                const liveRes = await fetch(`https://${API_HOST}/matches-live`, { headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': API_HOST }});
                const liveData = await liveRes.json();
                if(liveData.results) db.ref('archive/live').set(liveData.results);

                const recentRes = await fetch(`https://${API_HOST}/matches-recent`, { headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': API_HOST }});
                const recentData = await recentRes.json();
                if(recentData.results) db.ref('archive/recent').set(recentData.results.slice(0, 12));
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderFromDatabase() {
            // Live Update
            db.ref('archive/live').on('value', snap => {
                const container = document.getElementById('live-container');
                container.innerHTML = '';
                if(snap.exists() && snap.val().length > 0) {
                    snap.val().forEach(m => {
                        const sName = m.series ? m.series.name : (m.series_name || "International");
                        container.innerHTML += `
                            <div class="min-w-[420px] main-card rounded-[40px] p-10 border border-emerald-500/10 relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-4"><span class="bg-emerald-500 text-black text-[8px] font-black px-3 py-1 rounded-full animate-pulse">LIVE</span></div>
                                <p class="text-[10px] text-zinc-500 font-bold mb-4 uppercase italic tracking-widest">${sName}</p>
                                <div class="flex justify-between items-center">
                                    <div class="text-2xl font-black italic tracking-tighter w-1/2">${m.match_title}</div>
                                    <div class="text-emerald-400 font-black text-3xl tracking-tighter">${m.live_details ? m.live_details.score : 'Starting...'}</div>
                                </div>
                            </div>`;
                    });
                } else {
                    container.innerHTML = '<div class="bg-zinc-900/50 p-8 rounded-3xl text-zinc-600 font-bold italic border border-white/5 w-full text-center uppercase tracking-widest text-[10px]">No Live Matches Right Now</div>';
                }
            });

            // Recent Update
            db.ref('archive/recent').on('value', snap => {
                const grid = document.getElementById('results-grid');
                grid.innerHTML = '';
                if(snap.exists()){
                    snap.val().forEach(m => {
                        const sName = m.series ? m.series.name : (m.series_name || "T20 Series");
                        grid.innerHTML += `
                            <div class="recent-card p-8 rounded-[35px] border border-white/5 hover:bg-zinc-900 transition-all">
                                <div class="flex justify-between items-start mb-4">
                                    <p class="text-[8px] text-emerald-500 font-black uppercase tracking-widest">${sName}</p>
                                    <span class="text-[8px] text-zinc-600 font-bold uppercase">${m.date || 'Finished'}</span>
                                </div>
                                <div class="font-black text-lg mb-4 italic tracking-tighter text-zinc-200">${m.match_title}</div>
                                <div class="text-[10px] font-bold text-zinc-500 uppercase py-2 px-4 bg-black/50 rounded-xl border border-white/5 inline-block italic">${m.result || 'Match Completed'}</div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center text-zinc-800 font-black italic py-10">NO RECENT DATA IN DATABASE. SYNCING...</div>';
                    syncData();
                }
            });
        }

        syncData(); 
        renderFromDatabase();
        setInterval(syncData, 600000);
    </script>
</body>
</html>
