<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC-X PRO | The Home of Cricket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: white; 
            overflow-x: hidden; 
        }
        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .main-card {
            background: linear-gradient(145deg, #121212, #080808);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .main-card:hover {
            transform: translateY(-10px);
            border-color: rgba(16, 185, 129, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #loader {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-logo {
            font-size: 3rem;
            font-weight: 900;
            font-style: italic;
            color: #10b981;
            letter-spacing: -2px;
            animation: neon-pulse 1.5s infinite alternate;
        }

        @keyframes neon-pulse {
            0% { opacity: 0.3; transform: scale(0.95); filter: blur(2px); }
            100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 20px #10b981); }
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body class="pb-20">
    <div id="loader">
        <div class="loader-logo uppercase tracking-tighter">CRIC-X PRO</div>
        <p class="text-[9px] font-black text-zinc-700 uppercase tracking-[0.5em] mt-4">Syncing Live Data...</p>
    </div>

    <nav class="sticky top-0 z-50 glass-nav px-8 py-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-12">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white hover:text-emerald-400 transition-all cursor-pointer">
                    CRIC-X <span class="text-emerald-500">PRO</span>
                </h1>
            </div>
            
            <div class="hidden xl:flex gap-8 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <a href="index.html" class="text-white">Home</a>
                <a href="#" class="hover:text-white transition-all">News Hub</a>
                <a href="#" class="hover:text-white transition-all">Schedules</a>
                <a href="#" class="hover:text-white transition-all">Rankings</a>
                <a href="#" class="hover:text-white transition-all">Battle</a>
                <a href="#" class="hover:text-white transition-all">Squads</a>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center bg-white/5 border border-white/10 px-4 py-2 rounded-full gap-3 group focus-within:border-emerald-500 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-500 group-focus-within:text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" placeholder="Search Players..." class="bg-transparent border-none outline-none text-[10px] font-bold uppercase tracking-widest text-white placeholder:text-zinc-700 w-40">
            </div>
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-800 p-[1px]">
                <div class="w-full h-full bg-[#050505] rounded-[15px] flex items-center justify-center overflow-hidden font-black text-emerald-500 text-[10px]">U</div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-6 mt-12">
        <header class="flex justify-between items-end mb-8">
            <div>
                <p class="text-emerald-500 font-black text-[10px] uppercase tracking-[0.5em] mb-2">In Play</p>
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">Match Center</h2>
            </div>
        </header>

        <div class="flex gap-6 overflow-x-auto pb-10 no-scrollbar">
            <div class="min-w-[450px] main-card rounded-[50px] p-10 relative group block cursor-pointer">
                <div class="flex justify-between items-center mb-10">
                    <span class="bg-emerald-500 text-black text-[9px] font-black px-3 py-1 rounded italic uppercase">Live</span>
                    <span id="match-status" class="text-zinc-500 text-[9px] font-bold uppercase tracking-widest text-right">T20 World Cup</span>
                </div>
                <div class="flex justify-between items-center px-4">
                    <div class="text-center">
                        <p class="text-4xl font-black italic mb-2 uppercase">PAK</p>
                        <p id="live-score" class="text-emerald-400 font-black text-xl">Connecting...</p>
                    </div>
                    <div class="text-zinc-800 font-black italic text-2xl uppercase text-center mx-4">VS</div>
                    <div class="text-center">
                        <p class="text-4xl font-black italic mb-2 uppercase text-zinc-300">IND</p>
                        <p id="ind-score" class="text-[10px] font-bold uppercase tracking-tighter text-zinc-500">Yet to bat</p>
                    </div>
                </div>
                <div class="mt-10 pt-6 border-t border-white/5 text-center">
                    <p class="text-[9px] text-zinc-600 font-black uppercase tracking-[0.3em] group-hover:text-emerald-400 transition-colors">Enter Match Center →</p>
                </div>
            </div>

            <div class="min-w-[450px] main-card rounded-[50px] p-10 relative opacity-40">
                <div class="flex justify-between items-center mb-10">
                    <span class="bg-zinc-800 text-zinc-400 text-[9px] font-black px-3 py-1 rounded italic uppercase">Upcoming</span>
                </div>
                <div class="text-center py-4 text-zinc-500 uppercase font-black text-xs italic">Next Match Scheduled Soon</div>
            </div>
        </div>
    </main>

    <footer class="mt-20 bg-[#0a0a0a] border-t border-white/5 pt-12 pb-12">
        <div class="max-w-[1400px] mx-auto px-8 text-center">
            <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.2em]">© 2026 CRIC-X PRO NETWORK. Real-time Firebase Sync Active.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // Loader logic
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader");
            setTimeout(() => { loader.classList.add("loader-hidden"); }, 1000);
        });

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAFoOBzZPZPMI_rvuWjSevEqQbeOjcPKww",
            authDomain: "cric-x-pro.firebaseapp.com",
            databaseURL: "https://cric-x-pro-default-rtdb.firebaseio.com",
            projectId: "cric-x-pro",
            storageBucket: "cric-x-pro.firebasestorage.app",
            messagingSenderId: "610933718519",
            appId: "1:610933718519:web:fb3e46a50a001d3d7b82f2",
            measurementId: "G-ML9SELTXJ0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Listen for PAK Score
        database.ref('match1/score').on('value', (snapshot) => {
            if(snapshot.exists()) document.getElementById('live-score').innerText = snapshot.val();
        });

        // 2. Listen for IND Score
        database.ref('match1/ind_score').on('value', (snapshot) => {
            if(snapshot.exists()) document.getElementById('ind-score').innerText = snapshot.val();
        });

        // 3. Listen for Match Status
        database.ref('match1/status').on('value', (snapshot) => {
            if(snapshot.exists()) document.getElementById('match-status').innerText = snapshot.val();
        });
    </script>
</body>
</html>
