<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIC-X PRO | Player Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .comp-card { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 40px; padding: 40px; }
        .stat-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .bar-fill-left { height: 100%; background: #10b981; box-shadow: 0 0 15px #10b981; }
        .bar-fill-right { height: 100%; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
    </style>
</head>
<body class="pb-20">
 <nav class="sticky top-0 z-50 glass-nav px-8 py-5 flex justify-between items-center border-b border-white/5">
    
    <div class="flex items-center gap-12">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white hover:text-emerald-400 transition-all cursor-pointer">
                CRIC-X <span class="text-emerald-500">PRO</span>
            </h1>
        </div>
        
        <div class="hidden xl:flex gap-8 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500">
            <a href="index.html" class="hover:text-white transition-all">Home</a>
            <a href="news.html" class="hover:text-white transition-all">News Hub</a>
            <a href="series.html" class="hover:text-white transition-all">Schedules</a>
            <a href="rankings.html" class="hover:text-white transition-all">Rankings</a>
            <a href="compare.html" class="hover:text-white transition-all">Battle</a>
            <a href="squads.html" class="hover:text-white transition-all">Squads</a>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center bg-white/5 border border-white/10 px-4 py-2 rounded-full gap-3 group focus-within:border-emerald-500 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-500 group-focus-within:text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" placeholder="Search Players, Series..." class="bg-transparent border-none outline-none text-[10px] font-bold uppercase tracking-widest text-white placeholder:text-zinc-700 w-40">
        </div>

        <div class="flex items-center gap-4 border-l border-white/10 pl-6">
            <div class="text-right hidden sm:block">
                <p class="text-[8px] font-black text-zinc-600 uppercase leading-none">Welcome Back</p>
                <p class="text-[10px] font-black text-white uppercase tracking-tighter">Guest User</p>
            </div>
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-800 p-[1px]">
                <div class="w-full h-full bg-[#050505] rounded-[15px] flex items-center justify-center overflow-hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
        </div>
    </div>
</nav>

    <main class="max-w-[1200px] mx-auto px-6">
        <header class="text-center mb-16">
            <h2 class="text-6xl font-black italic tracking-tighter uppercase">Player <span class="text-emerald-500">Battle</span></h2>
            <p class="text-zinc-600 font-bold uppercase text-[10px] tracking-[0.5em] mt-4">Head to Head Statistics</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 relative">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 hidden lg:flex w-20 h-20 bg-white text-black rounded-full items-center justify-center font-black italic text-2xl z-10 shadow-[0_0_40px_rgba(255,255,255,0.3)]">VS</div>

            <div class="comp-card border-r-4 border-emerald-500">
                <div class="text-center mb-10">
                    <div class="w-32 h-32 bg-zinc-900 rounded-[40px] mx-auto mb-6 flex items-center justify-center text-4xl font-black italic text-emerald-500">BA</div>
                    <h3 class="text-3xl font-black italic uppercase">Babar Azam</h3>
                    <p class="text-emerald-500 text-[10px] font-bold uppercase tracking-widest">Pakistan</p>
                </div>
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between text-[10px] font-black uppercase"><span>Runs</span><span>5,729</span></div>
                        <div class="stat-bar"><div class="bar-fill-left w-[90%]"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-black uppercase"><span>Average</span><span>56.7</span></div>
                        <div class="stat-bar"><div class="bar-fill-left w-[95%]"></div></div>
                    </div>
                </div>
            </div>

            <div class="comp-card border-l-4 border-yellow-500">
                <div class="text-center mb-10">
                    <div class="w-32 h-32 bg-zinc-900 rounded-[40px] mx-auto mb-6 flex items-center justify-center text-4xl font-black italic text-yellow-500">VK</div>
                    <h3 class="text-3xl font-black italic uppercase">Virat Kohli</h3>
                    <p class="text-yellow-500 text-[10px] font-bold uppercase tracking-widest">India</p>
                </div>
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between text-[10px] font-black uppercase"><span>Runs</span><span>13,848</span></div>
                        <div class="stat-bar"><div class="bar-fill-right w-[100%]"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-black uppercase"><span>Average</span><span>58.6</span></div>
                        <div class="stat-bar"><div class="bar-fill-right w-[98%]"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
